services:
  unraid-monitor-bot:
    build:
      context: .
      args:
        # Set DOCKER_GID to match docker.sock ownership on host
        # Find with: ls -ln /var/run/docker.sock (look at group number)
        DOCKER_GID: ${DOCKER_GID:-0}
    container_name: unraid-monitor-bot
    restart: unless-stopped
    # If DOCKER_GID doesn't work, uncomment this to run as root:
    # user: root
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - UNRAID_API_KEY=${UNRAID_API_KEY:-}
      - TZ=Europe/London
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # For development, use local directories:
      # - ./config:/app/config:ro
      # - ./data:/app/data
      # For production on Unraid, use bind mounts:
      - /mnt/user/appdata/unraid-monitor/config:/app/config
      - /mnt/user/appdata/unraid-monitor/data:/app/data
    networks:
      - docknet

networks:
  docknet:
    external: true
