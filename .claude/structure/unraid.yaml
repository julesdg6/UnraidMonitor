# Unraid structure detail
module: unraid-monitor
directory: src/unraid/
description: Unraid server integration layer providing GraphQL client and specialized monitors for system metrics and array health

files:
  client.py:
    description: Direct GraphQL wrapper for Unraid API with connection management and CSRF header handling
    exports:
      - name: UnraidConnectionError
        kind: exception
        description: Raised when Unraid client is not connected or GraphQL query fails

      - name: UnraidClientWrapper
        kind: class
        description: GraphQL client for Unraid API, manages connection lifecycle, executes system/array queries
        methods:
          - name: connect
            params: []
            returns: Awaitable[None]
          - name: disconnect
            params: []
            returns: Awaitable[None]
          - name: is_connected
            params: []
            returns: bool
          - name: get_system_metrics
            params: []
            returns: Awaitable[dict[str, Any]]
          - name: get_array_status
            params: []
            returns: Awaitable[dict[str, Any]]

  monitors/system_monitor.py:
    description: Monitors Unraid system metrics (CPU, memory, temperature) with rate-limited alerting
    exports:
      - name: UnraidSystemMonitor
        kind: class
        description: Monitors CPU usage/temperature, memory usage, sends alerts when thresholds exceeded with rate limiting
        methods:
          - name: start
            params: []
            returns: Awaitable[None]
          - name: stop
            params: []
            returns: Awaitable[None]
          - name: check_once
            params: []
            returns: Awaitable[dict | None]
          - name: get_current_metrics
            params: []
            returns: Awaitable[dict | None]
          - name: get_array_status
            params: []
            returns: Awaitable[dict | None]

    imports:
      - from: src.config
        items: [UnraidConfig]
      - from: src.unraid.client
        items: [UnraidClientWrapper]
      - from: src.alerts.server_mute_manager
        items: [ServerMuteManager]

  monitors/array_monitor.py:
    description: Monitors Unraid array disks, parity status, and capacity with per-disk alert tracking
    exports:
      - name: ArrayMonitor
        kind: class
        description: Monitors disk health, temperature, and array capacity with alert deduplication per disk
        methods:
          - name: start
            params: []
            returns: Awaitable[None]
          - name: stop
            params: []
            returns: Awaitable[None]
          - name: check_once
            params: []
            returns: Awaitable[dict | None]
          - name: clear_alert_state
            params: []
            returns: None

    imports:
      - from: src.config
        items: [UnraidConfig]
      - from: src.unraid.client
        items: [UnraidClientWrapper]
      - from: src.alerts.array_mute_manager
        items: [ArrayMuteManager]
