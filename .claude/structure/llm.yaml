# LLM providers structure detail
module: services/llm
directory: src/services/llm/
description: Multi-provider LLM abstraction layer

files:
  provider.py:
    description: Protocol definition and shared data types for all LLM providers
    exports:
      - name: ToolCall
        kind: dataclass
        fields: [{name: id, type: str}, {name: name, type: str}, {name: input, type: "dict[str, Any]"}]
        description: Normalized tool call from any LLM provider
      - name: LLMResponse
        kind: dataclass
        fields: [{name: text, type: str}, {name: stop_reason, type: str}, {name: tool_calls, type: "list[ToolCall] | None"}]
        description: Normalized response from any LLM provider (stop_reason is "end", "tool_use", or "max_tokens")
      - name: ModelInfo
        kind: dataclass
        fields: [{name: id, type: str}, {name: name, type: str}, {name: provider, type: str}, {name: supports_tools, type: bool}]
        description: Metadata about an available model
      - name: LLMProvider
        kind: protocol
        methods:
          - name: chat
            params: [{name: messages, type: "list[dict[str, Any]]"}, {name: system, type: "str | None"}, {name: max_tokens, type: int}, {name: tools, type: "list[dict[str, Any]] | None"}]
            returns: LLMResponse
          - name: supports_tools
            kind: property
            returns: bool
          - name: model_name
            kind: property
            returns: str
          - name: provider_name
            kind: property
            returns: str
        description: Protocol that all LLM providers implement

  anthropic_provider.py:
    description: Anthropic Claude provider with prompt caching and tool use
    exports:
      - name: AnthropicProvider
        kind: class
        constructor: [{name: client, type: Any}, {name: model, type: str}]
        description: Wraps AsyncAnthropic with prompt caching (cache_control) on system and tools
    imports:
      - from: services/llm/provider
        items: [LLMProvider, LLMResponse, ToolCall]

  openai_provider.py:
    description: OpenAI GPT provider with function calling translation
    exports:
      - name: OpenAIProvider
        kind: class
        constructor: [{name: client, type: Any}, {name: model, type: str}, {name: supports_tools, type: bool}]
        description: Wraps AsyncOpenAI, translates input_schema to function/parameters format
    imports:
      - from: services/llm/provider
        items: [LLMResponse, ToolCall]

  ollama_provider.py:
    description: Ollama local provider extending OpenAIProvider with model discovery
    exports:
      - name: OllamaProvider
        kind: class
        constructor: [{name: client, type: Any}, {name: model, type: str}, {name: supports_tools, type: bool}]
        description: Extends OpenAIProvider for Ollama's OpenAI-compatible API
      - name: OllamaProvider.discover_models
        kind: staticmethod
        params: [{name: host, type: str}, {name: session, type: aiohttp.ClientSession}]
        returns: "list[ModelInfo]"
        description: Query Ollama /api/tags to discover available models and tool support
    imports:
      - from: services/llm/openai_provider
        items: [OpenAIProvider]
      - from: services/llm/provider
        items: [ModelInfo]

  registry.py:
    description: Central orchestrator for multi-provider model selection and per-feature overrides
    exports:
      - name: ProviderInfo
        kind: dataclass
        fields: [{name: name, type: str}, {name: display_name, type: str}, {name: available_models, type: "list[ModelInfo]"}]
        description: Summary of a configured provider and its models
      - name: ProviderRegistry
        kind: class
        constructor: [{name: anthropic_client, type: "Any | None"}, {name: openai_client, type: "Any | None"}, {name: ollama_client, type: "Any | None"}, {name: ollama_models, type: "list[ModelInfo] | None"}, {name: default_model, type: "str | None"}, {name: feature_models, type: "dict[str, str] | None"}, {name: data_dir, type: "str | None"}]
        methods:
          - name: get_provider
            params: [{name: feature, type: str, default: '"default"'}]
            returns: "LLMProvider | None"
            description: Get provider for a feature (checks per-feature overrides, then global default)
          - name: set_model
            params: [{name: provider_name, type: str}, {name: model_name, type: str}]
            returns: None
            description: Switch global default model and persist to data/model_selection.json
          - name: get_available_providers
            returns: "list[ProviderInfo]"
            description: List all configured providers with their available models
          - name: get_current_model
            returns: "tuple[str, str] | None"
            description: Return (provider_name, model_name) for global default
        description: Single source of truth for which LLM provider/model to use
    imports:
      - from: services/llm/anthropic_provider
        items: [AnthropicProvider]
      - from: services/llm/openai_provider
        items: [OpenAIProvider]
      - from: services/llm/ollama_provider
        items: [OllamaProvider]
      - from: services/llm/provider
        items: [LLMProvider, ModelInfo]
