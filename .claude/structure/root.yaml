# Root source files structure detail
module: unraid-monitor
directory: src/
description: Core application entry point, configuration management, data models, and pattern analysis

files:
  main.py:
    description: Application entry point and composition root. Orchestrates bot setup, monitor wiring, graceful shutdown, and first-run wizard.
    exports:
      - name: AlertManagerProxy
        kind: class
        description: Proxy that dynamically resolves chat_id and queues alerts until bot is ready. Includes send lock to prevent Telegram rate limit abuse.
        methods:
          - name: __init__
            params: [{name: bot, type: object}, {name: chat_id_store, type: ChatIdStore}, {name: error_display_max_chars, type: int}]
            returns: None
          - name: _get_manager
            params: [{name: chat_id, type: int}]
            returns: AlertManager
          - name: _send_alert
            params: [{name: method_name, type: str}]
            returns: Coroutine
          - name: _flush_queue
            params: [{name: chat_id, type: int}]
            returns: Coroutine
          - name: send_crash_alert
            returns: Coroutine
          - name: send_log_error_alert
            returns: Coroutine
          - name: send_resource_alert
            returns: Coroutine
      - name: _BackgroundTasks
        kind: class
        description: Holds references to all background monitors and async tasks for coordinated shutdown.
        methods:
          - name: __init__
            params: []
            returns: None
          - name: add_task
            params: [{name: task, type: asyncio.Task}]
            returns: None
          - name: shutdown
            returns: Coroutine
      - name: start_monitoring
        kind: function
        description: Initializes all monitors (Docker, logs, resources, Unraid) and registers bot commands. Called on startup or after wizard completion.
        params: [{name: config, type: AppConfig}, {name: settings, type: Settings}, {name: bot, type: object}, {name: dp, type: object}, {name: chat_id_store, type: ChatIdStore}, {name: bg, type: _BackgroundTasks}]
        returns: Coroutine
      - name: main
        kind: function
        description: Main entry point. Handles first-run wizard or normal startup with all monitors.
        params: []
        returns: Coroutine
    imports:
      - from: src.config
        items: [Settings, AppConfig]
      - from: src.state
        items: [ContainerStateManager]
      - from: src.monitors.docker_events
        items: [DockerEventMonitor]
      - from: src.monitors.log_watcher
        items: [LogWatcher]
      - from: src.monitors.memory_monitor
        items: [MemoryMonitor]
      - from: src.monitors.resource_monitor
        items: [ResourceMonitor]
      - from: src.alerts.manager
        items: [AlertManager, ChatIdStore]
      - from: src.alerts.rate_limiter
        items: [RateLimiter]
      - from: src.alerts.ignore_manager
        items: [IgnoreManager]
      - from: src.alerts.mute_manager
        items: [MuteManager]
      - from: src.analysis.pattern_analyzer
        items: [PatternAnalyzer]
      - from: src.unraid.client
        items: [UnraidClientWrapper]
      - from: src.unraid.monitors.system_monitor
        items: [UnraidSystemMonitor]
      - from: src.unraid.monitors.array_monitor
        items: [ArrayMonitor]
      - from: src.bot.telegram_bot
        items: [create_bot, create_dispatcher, register_commands, register_setup_wizard]

  config.py:
    description: Configuration management using Pydantic Settings (env vars) and YAML config. Provides typed config objects and ConfigWriter for setup wizard.
    exports:
      - name: AIConfig
        kind: dataclass
        description: AI/Claude API settings including models, token limits, and NL processor behavior.
        methods:
          - name: from_dict
            params: [{name: data, type: dict}]
            returns: AIConfig
      - name: BotConfig
        kind: dataclass
        description: Telegram bot display and behavior settings (timeouts, log limits, error display).
        methods:
          - name: from_dict
            params: [{name: data, type: dict}]
            returns: BotConfig
      - name: DockerConfig
        kind: dataclass
        description: Docker connection configuration (socket path).
        methods:
          - name: from_dict
            params: [{name: data, type: dict}]
            returns: DockerConfig
      - name: ResourceConfig
        kind: dataclass
        description: Per-container CPU/memory monitoring settings with overridable thresholds.
        methods:
          - name: from_dict
            params: [{name: data, type: dict}]
            returns: ResourceConfig
          - name: get_thresholds
            params: [{name: container_name, type: str}]
            returns: tuple[int, int]
      - name: MemoryConfig
        kind: dataclass
        description: System memory pressure management with thresholds, kill policy, and priority containers.
        methods:
          - name: from_dict
            params: [{name: data, type: dict}]
            returns: MemoryConfig
      - name: UnraidConfig
        kind: dataclass
        description: Unraid server monitoring settings (host, SSL, thresholds, polling intervals).
        methods:
          - name: from_dict
            params: [{name: data, type: dict}]
            returns: UnraidConfig
      - name: Settings
        kind: class
        description: Pydantic BaseSettings for environment variables (bot token, API keys, paths).
        methods:
          - name: parse_allowed_users
            params: [{name: v, type: Any}]
            returns: list[int]
      - name: AppConfig
        kind: class
        description: Combines Settings (env) and YAML config, providing unified access to all configuration.
        methods:
          - name: __init__
            params: [{name: settings, type: Settings}]
            returns: None
          - name: ignored_containers
            returns: list[str]
          - name: protected_containers
            returns: list[str]
          - name: log_watching
            returns: dict[str, Any]
          - name: telegram_bot_token
            returns: str
          - name: telegram_allowed_users
            returns: list[int]
          - name: anthropic_api_key
            returns: str | None
          - name: log_level
            returns: str
          - name: ai
            returns: AIConfig
          - name: bot
            returns: BotConfig
          - name: docker
            returns: DockerConfig
          - name: resource_monitoring
            returns: ResourceConfig
          - name: unraid
            returns: UnraidConfig
          - name: memory_management
            returns: MemoryConfig
      - name: ConfigWriter
        kind: class
        description: Writes and merges wizard results into config.yaml atomically, preserving custom thresholds.
        methods:
          - name: __init__
            params: [{name: config_path, type: str}]
            returns: None
          - name: write
            params: [
              {name: unraid_host, type: str | None},
              {name: unraid_port, type: int},
              {name: unraid_use_ssl, type: bool},
              {name: watched_containers, type: list[str]},
              {name: protected_containers, type: list[str]},
              {name: ignored_containers, type: list[str]},
              {name: priority_containers, type: list[str]},
              {name: killable_containers, type: list[str]}
            ]
            returns: None
          - name: merge
            params: [
              {name: unraid_host, type: str | None},
              {name: unraid_port, type: int},
              {name: unraid_use_ssl, type: bool},
              {name: watched_containers, type: list[str]},
              {name: protected_containers, type: list[str]},
              {name: ignored_containers, type: list[str]},
              {name: priority_containers, type: list[str]},
              {name: killable_containers, type: list[str]},
              {name: skip_unraid, type: bool}
            ]
            returns: None
      - name: load_yaml_config
        kind: function
        description: Loads YAML configuration from file, returning empty dict if missing or empty.
        params: [{name: path, type: str}]
        returns: dict[str, Any]
      - name: generate_default_config
        kind: function
        description: Generates default config.yaml template if it does not exist.
        params: [{name: config_path, type: str}]
        returns: bool
    imports:
      - from: pydantic
        items: [field_validator]
      - from: pydantic_settings
        items: [BaseSettings, SettingsConfigDict]
      - from: yaml
        items: [safe_load, dump]

  models.py:
    description: Data models for container state representation.
    exports:
      - name: ContainerInfo
        kind: dataclass
        description: Immutable container state snapshot (name, status, health, image, uptime).
        methods:
          - name: uptime_seconds
            returns: int | None
    imports:
      - from: datetime
        items: [datetime]

  state.py:
    description: Thread-safe container state manager for coordinating between Docker event thread and async loop.
    exports:
      - name: ContainerStateManager
        kind: class
        description: Thread-safe dictionary of container state with locking for event/async synchronization.
        methods:
          - name: __init__
            params: []
            returns: None
          - name: update
            params: [{name: info, type: ContainerInfo}]
            returns: None
          - name: get
            params: [{name: name, type: str}]
            returns: ContainerInfo | None
          - name: get_all
            params: []
            returns: list[ContainerInfo]
          - name: get_all_names
            params: []
            returns: set[str]
          - name: remove
            params: [{name: name, type: str}]
            returns: None
          - name: find_by_name
            params: [{name: partial, type: str}]
            returns: list[ContainerInfo]
          - name: get_summary
            params: []
            returns: dict[str, int]
    imports:
      - from: src.models
        items: [ContainerInfo]
      - from: threading
        items: [Lock]

  analysis/pattern_analyzer.py:
    description: Haiku-based pattern analyzer for generating regex/substring ignore patterns from error examples.
    exports:
      - name: PatternAnalyzer
        kind: class
        description: Uses Claude Haiku to analyze container errors and generate smart ignore patterns with explanations.
        methods:
          - name: __init__
            params: [
              {name: anthropic_client, type: anthropic.AsyncAnthropic | None},
              {name: model, type: str},
              {name: max_tokens, type: int},
              {name: context_lines, type: int}
            ]
            returns: None
          - name: analyze_error
            params: [
              {name: container, type: str},
              {name: error_message, type: str},
              {name: recent_logs, type: list[str]}
            ]
            returns: Coroutine[dict | None]
    imports:
      - from: src.utils.api_errors
        items: [handle_anthropic_error]
      - from: src.utils.sanitize
        items: [sanitize_container_name, sanitize_logs]
