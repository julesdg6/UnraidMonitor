# Services structure detail
module: unraid-monitor
directory: src/services/
description: Business logic layer providing natural language processing, container control, classification, and diagnostics

files:
  nl_processor.py:
    description: Processes natural language messages using Claude API with tool support and per-user conversation memory
    exports:
      - name: ConversationMemory
        kind: dataclass
        description: Stores conversation history and pending actions for a single user
        methods:
          - name: add_exchange
            params: [{name: user_message, type: str}, {name: assistant_message, type: str}]
            returns: None
          - name: get_messages
            params: []
            returns: list[dict[str, str]]
          - name: clear
            params: []
            returns: None

      - name: MemoryStore
        kind: class
        description: Manages conversation memories for multiple users with TTL expiration and max user limits
        methods:
          - name: get_or_create
            params: [{name: user_id, type: int}]
            returns: ConversationMemory
          - name: get
            params: [{name: user_id, type: int}]
            returns: ConversationMemory | None
          - name: clear_user
            params: [{name: user_id, type: int}]
            returns: None

      - name: ProcessResult
        kind: dataclass
        description: Result from processing a natural language message
        properties:
          - name: response
            type: str
          - name: pending_action
            type: dict[str, Any] | None

      - name: NLProcessor
        kind: class
        description: Processes NL messages with Claude API, manages conversation memory, executes tools with confirmation workflow
        methods:
          - name: process
            params: [{name: user_id, type: int}, {name: message, type: str}]
            returns: Awaitable[ProcessResult]

    imports:
      - from: src.services.nl_tools
        items: [get_tool_definitions]
      - from: src.utils.api_errors
        items: [handle_anthropic_error]
      - from: src.utils.rate_limiter
        items: [PerUserRateLimiter]

  nl_tools.py:
    description: Defines tools for Claude API (container status, logs, resources, server/array info) and executes them against live system
    exports:
      - name: get_tool_definitions
        kind: function
        description: Return tool definitions for Claude API tool-use (read-only + action tools)
        params: []
        returns: list[dict[str, Any]]

      - name: NLToolExecutor
        kind: class
        description: Executes NL tools (container queries, server/array stats) and enforces protection/confirmation checks
        methods:
          - name: execute
            params: [{name: tool_name, type: str}, {name: args, type: dict[str, Any]}]
            returns: Awaitable[str]

    imports:
      - from: src.state
        items: [ContainerStateManager]
      - from: src.models
        items: [ContainerInfo]
      - from: src.services.container_control
        items: [ContainerController]
      - from: src.monitors.resource_monitor
        items: [ResourceMonitor]
      - from: src.alerts.recent_errors
        items: [RecentErrorsBuffer]
      - from: src.unraid.monitors.system_monitor
        items: [UnraidSystemMonitor]

  container_control.py:
    description: Provides safe container operations (restart, stop, start, pull) with rollback support
    exports:
      - name: ContainerController
        kind: class
        description: Controls Docker containers with protection list, offers restart/stop/start/pull operations with error recovery
        methods:
          - name: is_protected
            params: [{name: container_name, type: str}]
            returns: bool
          - name: restart
            params: [{name: container_name, type: str}]
            returns: Awaitable[str]
          - name: stop
            params: [{name: container_name, type: str}]
            returns: Awaitable[str]
          - name: start
            params: [{name: container_name, type: str}]
            returns: Awaitable[str]
          - name: pull_and_recreate
            params: [{name: container_name, type: str}]
            returns: Awaitable[str]

  container_classifier.py:
    description: Classifies containers by role using pattern matching and optional AI classification
    exports:
      - name: ContainerClassification
        kind: dataclass
        description: Classification result for a single container with categories and description
        properties:
          - name: name
            type: str
          - name: image
            type: str
          - name: categories
            type: set[str]
          - name: description
            type: str
          - name: ai_suggested
            type: bool

      - name: ContainerClassifier
        kind: class
        description: Classifies containers into monitoring categories (priority, protected, watched, killable, ignored)
        methods:
          - name: classify_by_pattern
            params: [{name: name, type: str}, {name: image, type: str}]
            returns: ContainerClassification
          - name: classify_batch_with_ai
            params: [{name: unclassified, type: list[ContainerClassification]}]
            returns: Awaitable[list[ContainerClassification]]
          - name: classify_all
            params: [{name: containers, type: list[tuple[str, str, str]]}]
            returns: Awaitable[list[ContainerClassification]]

    imports:
      - from: src.utils.api_errors
        items: [handle_anthropic_error]
      - from: src.utils.sanitize
        items: [sanitize_container_name]

  diagnostic.py:
    description: AI-powered container diagnostics service for analyzing container failures and logs
    exports:
      - name: DiagnosticContext
        kind: dataclass
        description: Context information for a diagnostic request
        properties:
          - name: container_name
            type: str
          - name: logs
            type: str
          - name: exit_code
            type: int | None
          - name: image
            type: str
          - name: uptime_seconds
            type: int | None
          - name: restart_count
            type: int

      - name: DiagnosticService
        kind: class
        description: Gathers container context and provides AI-powered analysis of container failures
        methods:
          - name: gather_context
            params: [{name: container_name, type: str}, {name: lines, type: int}]
            returns: Awaitable[DiagnosticContext | None]
          - name: analyze
            params: [{name: context, type: DiagnosticContext}]
            returns: Awaitable[str]
          - name: store_context
            params: [{name: user_id, type: int}, {name: context, type: DiagnosticContext}]
            returns: None
          - name: has_pending
            params: [{name: user_id, type: int}]
            returns: bool
          - name: get_details
            params: [{name: user_id, type: int}]
            returns: Awaitable[str | None]

    imports:
      - from: src.utils.api_errors
        items: [handle_anthropic_error]
      - from: src.utils.formatting
        items: [format_uptime]
      - from: src.utils.sanitize
        items: [sanitize_container_name, sanitize_logs]
