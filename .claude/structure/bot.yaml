# bot structure detail
module: unraid-monitor
directory: src/bot/
description: Telegram bot command and callback handlers, setup wizard, and confirmation management

files:
  telegram_bot.py:
    description: Core bot setup, dispatcher creation, and command registration
    exports:
      - name: AuthMiddleware
        kind: class
        description: Middleware for user authentication and chat ID tracking
      - name: create_auth_middleware
        kind: function
        signature: (allowed_users: list[int], chat_id_store=None) -> AuthMiddleware
        description: Factory function for auth middleware
      - name: create_bot
        kind: function
        signature: (token: str) -> Bot
        description: Create Telegram bot instance
      - name: create_dispatcher
        kind: function
        signature: (allowed_users: list[int], chat_id_store=None) -> Dispatcher
        description: Create dispatcher with auth middleware
      - name: register_commands
        kind: function
        signature: (dp: Dispatcher, state: ContainerStateManager, ...) -> tuple[ContainerController | None, DiagnosticService | None]
        description: Register all command handlers and return controller/diagnostic service
      - name: register_setup_wizard
        kind: function
        signature: (dp: Dispatcher, wizard: SetupWizard, on_complete: Callable[[], Awaitable[None]] | None = None, register_start: bool = True) -> None
        description: Register setup wizard handlers on the dispatcher
    imports:
      - from: src.state
        items: [ContainerStateManager]
      - from: src.bot.commands
        items: [help_command, status_command, logs_command]
      - from: src.bot.control_commands
        items: [restart_command, stop_command, start_command, pull_command, create_ctrl_confirm_callback, create_ctrl_cancel_callback]
      - from: src.bot.diagnose_command
        items: [diagnose_command, diag_details_callback]
      - from: src.bot.ignore_command
        items: [ignore_command, ignores_command, IgnoreSelectionState, ignore_similar_callback, ignore_toggle_callback, ignore_all_callback, ignore_done_callback, ignore_cancel_callback]
      - from: src.bot.manage_command
        items: [manage_command, manage_back_callback, manage_status_callback, manage_resources_callback, manage_server_callback, manage_disks_callback, manage_ignores_callback, manage_ignores_container_callback, manage_mutes_callback, manage_delete_ignore_callback, manage_delete_mute_callback]
      - from: src.services.container_control
        items: [ContainerController]
      - from: src.services.diagnostic
        items: [DiagnosticService]

  commands.py:
    description: Help, status, and logs command handlers
    exports:
      - name: help_command
        kind: function
        signature: (state: ContainerStateManager) -> Callable[[Message], Awaitable[None]]
        description: Factory for /help command handler
      - name: format_status_summary
        kind: function
        signature: (state: ContainerStateManager) -> str
        description: Format container status summary with counts
      - name: format_container_details
        kind: function
        signature: (container: ContainerInfo, resource_monitor: ResourceMonitor | None = None) -> str
        description: Async function to format detailed container info with optional resource stats
      - name: status_command
        kind: function
        signature: (state: ContainerStateManager, resource_monitor: ResourceMonitor | None = None) -> Callable[[Message], Awaitable[None]]
        description: Factory for /status command handler (summary or specific container)
      - name: logs_command
        kind: function
        signature: (state: ContainerStateManager, docker_client: docker.DockerClient, max_lines: int = 100, max_chars: int = 4000) -> Callable[[Message], Awaitable[None]]
        description: Factory for /logs command handler
    imports:
      - from: src.models
        items: [ContainerInfo]
      - from: src.state
        items: [ContainerStateManager]

  control_commands.py:
    description: Container control commands (restart, stop, start, pull) with inline button confirmations
    exports:
      - name: restart_command
        kind: function
        signature: (state: ContainerStateManager, controller: ContainerController) -> Callable[[Message], Awaitable[None]]
        description: Factory for /restart command handler
      - name: stop_command
        kind: function
        signature: (state: ContainerStateManager, controller: ContainerController) -> Callable[[Message], Awaitable[None]]
        description: Factory for /stop command handler
      - name: start_command
        kind: function
        signature: (state: ContainerStateManager, controller: ContainerController) -> Callable[[Message], Awaitable[None]]
        description: Factory for /start command handler
      - name: pull_command
        kind: function
        signature: (state: ContainerStateManager, controller: ContainerController) -> Callable[[Message], Awaitable[None]]
        description: Factory for /pull command handler
      - name: create_ctrl_confirm_callback
        kind: function
        signature: (state: ContainerStateManager, controller: ContainerController) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for inline button confirm callback
      - name: create_ctrl_cancel_callback
        kind: function
        signature: () -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for inline button cancel callback
    imports:
      - from: src.state
        items: [ContainerStateManager]
      - from: src.services.container_control
        items: [ContainerController]

  diagnose_command.py:
    description: AI-powered container diagnostics via /diagnose command
    exports:
      - name: diagnose_command
        kind: function
        signature: (state: ContainerStateManager, diagnostic_service: DiagnosticService, max_lines: int = 500) -> Callable[[Message], Awaitable[None]]
        description: Factory for /diagnose command handler with AI analysis and inline buttons
      - name: diag_details_callback
        kind: function
        signature: (diagnostic_service: DiagnosticService) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for diag_details callback (shows extended diagnosis)
    imports:
      - from: src.state
        items: [ContainerStateManager]
      - from: src.services.diagnostic
        items: [DiagnosticService]

  resources_command.py:
    description: Container resource usage monitoring via /resources command
    exports:
      - name: format_progress_bar
        kind: function
        signature: (percent: float, width: int = 16) -> str
        description: Format a progress bar for resource usage
      - name: format_summary_line
        kind: function
        signature: (name: str, cpu: float, mem: float, mem_display: str) -> str
        description: Format a single container line for summary view
      - name: format_resources_summary
        kind: function
        signature: (resource_monitor: ResourceMonitor) -> str | None
        description: Async function to format resource summary for all containers
      - name: resources_command
        kind: function
        signature: (resource_monitor: ResourceMonitor) -> Callable[[Message], Awaitable[None]]
        description: Factory for /resources command handler
    imports:
      - from: src.monitors.resource_monitor
        items: [ResourceMonitor]

  unraid_commands.py:
    description: Unraid server monitoring commands (/server, /array, /disks)
    exports:
      - name: format_uptime
        kind: function
        signature: (uptime_str: str) -> str
        description: Format ISO timestamp uptime to human-readable format
      - name: format_server_brief
        kind: function
        signature: (system_monitor: UnraidSystemMonitor) -> str | None
        description: Async function to format brief server status
      - name: format_server_detailed
        kind: function
        signature: (system_monitor: UnraidSystemMonitor) -> str | None
        description: Async function to format detailed server status
      - name: format_disks
        kind: function
        signature: (system_monitor: UnraidSystemMonitor) -> str | None
        description: Async function to format disk status
      - name: server_command
        kind: function
        signature: (system_monitor: UnraidSystemMonitor) -> Callable[[Message], Awaitable[None]]
        description: Factory for /server command handler (brief or detailed)
      - name: mute_server_command
        kind: function
        signature: (mute_manager: ServerMuteManager) -> Callable[[Message], Awaitable[None]]
        description: Factory for /mute-server command handler
      - name: unmute_server_command
        kind: function
        signature: (mute_manager: ServerMuteManager) -> Callable[[Message], Awaitable[None]]
        description: Factory for /unmute-server command handler
      - name: mute_array_command
        kind: function
        signature: (mute_manager: ArrayMuteManager) -> Callable[[Message], Awaitable[None]]
        description: Factory for /mute-array command handler
      - name: unmute_array_command
        kind: function
        signature: (mute_manager: ArrayMuteManager) -> Callable[[Message], Awaitable[None]]
        description: Factory for /unmute-array command handler
      - name: array_command
        kind: function
        signature: (system_monitor: UnraidSystemMonitor) -> Callable[[Message], Awaitable[None]]
        description: Factory for /array command handler
      - name: disks_command
        kind: function
        signature: (system_monitor: UnraidSystemMonitor) -> Callable[[Message], Awaitable[None]]
        description: Factory for /disks command handler
    imports:
      - from: src.unraid.monitors.system_monitor
        items: [UnraidSystemMonitor]
      - from: src.alerts.server_mute_manager
        items: [ServerMuteManager]
      - from: src.alerts.array_mute_manager
        items: [ArrayMuteManager]

  mute_command.py:
    description: Mute alert handling via /mute, /mutes, /unmute commands
    exports:
      - name: mute_command
        kind: function
        signature: (state: ContainerStateManager, mute_manager: MuteManager) -> Callable[[Message], Awaitable[None]]
        description: Factory for /mute command handler
      - name: format_duration
        kind: function
        signature: (delta: timedelta) -> str
        description: Format timedelta for display (e.g., "1h 30m")
      - name: mutes_command
        kind: function
        signature: (mute_manager: MuteManager, server_mute_manager: ServerMuteManager | None = None, array_mute_manager: ArrayMuteManager | None = None) -> Callable[[Message], Awaitable[None]]
        description: Factory for /mutes command handler (shows all active mutes)
      - name: unmute_command
        kind: function
        signature: (state: ContainerStateManager, mute_manager: MuteManager) -> Callable[[Message], Awaitable[None]]
        description: Factory for /unmute command handler
    imports:
      - from: src.state
        items: [ContainerStateManager]
      - from: src.alerts.mute_manager
        items: [MuteManager]
      - from: src.alerts.server_mute_manager
        items: [ServerMuteManager]
      - from: src.alerts.array_mute_manager
        items: [ArrayMuteManager]

  ignore_command.py:
    description: Error pattern ignoring via /ignore, /ignores commands and inline button callbacks
    exports:
      - name: IgnoreSelectionState
        kind: class
        description: Shared state for ignore selections with toggle tracking
        methods:
          - name: has_pending(user_id: int) -> bool
            description: Check if user has a pending selection
          - name: get_pending(user_id: int) -> tuple[str, list[str]] | None
            description: Get pending selection (container, errors)
          - name: get_selected(user_id: int) -> set[int]
            description: Get selected indices for user
          - name: toggle_selection(user_id: int, index: int) -> None
            description: Toggle a single index in the selection
          - name: select_all(user_id: int) -> None
            description: Select all or deselect all (toggle)
          - name: set_pending(user_id: int, container: str, errors: list[str]) -> None
            description: Store pending selection with empty selected set
          - name: clear_pending(user_id: int) -> None
            description: Clear pending selection
      - name: ignore_command
        kind: function
        signature: (recent_buffer: RecentErrorsBuffer, ignore_manager: IgnoreManager, selection_state: IgnoreSelectionState) -> Callable[[Message], Awaitable[None]]
        description: Factory for /ignore command handler with inline toggle buttons
      - name: ignore_toggle_callback
        kind: function
        signature: (selection_state: IgnoreSelectionState) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for ign_toggle callback (toggles single error selection)
      - name: ignore_all_callback
        kind: function
        signature: (selection_state: IgnoreSelectionState) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for ign_all callback (select/deselect all)
      - name: ignore_done_callback
        kind: function
        signature: (ignore_manager: IgnoreManager, selection_state: IgnoreSelectionState, pattern_analyzer: PatternAnalyzer | None = None) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for ign_done callback (processes selected errors)
      - name: ignore_cancel_callback
        kind: function
        signature: (selection_state: IgnoreSelectionState) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for ign_cancel callback (cancels selection)
      - name: ignores_command
        kind: function
        signature: (ignore_manager: IgnoreManager) -> Callable[[Message], Awaitable[None]]
        description: Factory for /ignores command handler (list all ignores)
      - name: ignore_similar_callback
        kind: function
        signature: (ignore_manager: IgnoreManager, pattern_analyzer: PatternAnalyzer | None, recent_errors_buffer: RecentErrorsBuffer) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for ignore similar button callback handler
    imports:
      - from: src.alerts.recent_errors
        items: [RecentErrorsBuffer]
      - from: src.alerts.ignore_manager
        items: [IgnoreManager]
      - from: src.analysis.pattern_analyzer
        items: [PatternAnalyzer]

  manage_command.py:
    description: Dashboard for managing ignores and mutes via /manage command with inline buttons
    exports:
      - name: _build_manage_keyboard
        kind: function
        signature: () -> InlineKeyboardMarkup
        description: Build the main /manage dashboard keyboard
      - name: manage_command
        kind: function
        signature: (system_monitor: UnraidSystemMonitor | None = None) -> Callable[[Message], Awaitable[None]]
        description: Factory for /manage command handler (dashboard with buttons)
      - name: manage_back_callback
        kind: function
        signature: (system_monitor: UnraidSystemMonitor | None = None) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for manage:back callback (re-renders dashboard)
      - name: manage_status_callback
        kind: function
        signature: (state: ContainerStateManager) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for status button callback
      - name: manage_resources_callback
        kind: function
        signature: (resource_monitor: ResourceMonitor | None) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for resources button callback
      - name: manage_server_callback
        kind: function
        signature: (system_monitor: UnraidSystemMonitor | None) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for server button callback (shows detailed info)
      - name: manage_disks_callback
        kind: function
        signature: (system_monitor: UnraidSystemMonitor | None) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for disks button callback
      - name: manage_ignores_callback
        kind: function
        signature: (ignore_manager: IgnoreManager) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for manage ignores button callback (with Back button)
      - name: manage_ignores_container_callback
        kind: function
        signature: (ignore_manager: IgnoreManager) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for container ignore detail view with delete buttons
      - name: manage_mutes_callback
        kind: function
        signature: (mute_manager: MuteManager, server_mute_manager: ServerMuteManager | None, array_mute_manager: ArrayMuteManager | None) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for manage mutes view with delete buttons
      - name: manage_delete_ignore_callback
        kind: function
        signature: (ignore_manager: IgnoreManager) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for mdi:* callback (deletes individual ignore, re-renders list)
      - name: manage_delete_mute_callback
        kind: function
        signature: (mute_manager: MuteManager, server_mute_manager: ServerMuteManager | None, array_mute_manager: ArrayMuteManager | None) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for mdm:* callback (unmutes, re-renders list)
    imports:
      - from: src.state
        items: [ContainerStateManager]
      - from: src.alerts.ignore_manager
        items: [IgnoreManager]
      - from: src.alerts.mute_manager
        items: [MuteManager]
      - from: src.alerts.server_mute_manager
        items: [ServerMuteManager]
      - from: src.alerts.array_mute_manager
        items: [ArrayMuteManager]
      - from: src.monitors.resource_monitor
        items: [ResourceMonitor]
      - from: src.unraid.monitors.system_monitor
        items: [UnraidSystemMonitor]

  alert_callbacks.py:
    description: Quick-action button callbacks on alert messages
    exports:
      - name: restart_callback
        kind: function
        signature: (state: ContainerStateManager, controller: ContainerController) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for restart button callback handler
      - name: logs_callback
        kind: function
        signature: (state: ContainerStateManager, docker_client: docker.DockerClient, max_lines: int = 100, max_chars: int = 4000) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for logs button callback handler
      - name: diagnose_callback
        kind: function
        signature: (state: ContainerStateManager, diagnostic_service: DiagnosticService | None) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for diagnose button callback handler
      - name: mute_callback
        kind: function
        signature: (state: ContainerStateManager, mute_manager: Any) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for mute button callback handler
      - name: mem_kill_callback
        kind: function
        signature: (memory_monitor: MemoryMonitor) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for memory kill button callback handler
      - name: mem_cancel_kill_callback
        kind: function
        signature: (memory_monitor: MemoryMonitor) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for cancel auto-kill button callback handler
      - name: mem_restart_yes_callback
        kind: function
        signature: (memory_monitor: MemoryMonitor) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for memory restart Yes button callback handler
      - name: mem_restart_no_callback
        kind: function
        signature: (memory_monitor: MemoryMonitor) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for memory restart No button callback handler
    imports:
      - from: src.state
        items: [ContainerStateManager]
      - from: src.services.container_control
        items: [ContainerController]
      - from: src.services.diagnostic
        items: [DiagnosticService]
      - from: src.monitors.memory_monitor
        items: [MemoryMonitor]

  nl_handler.py:
    description: Natural language message handler for conversational interaction
    exports:
      - name: NLFilter
        kind: class
        description: Filter that matches non-command text messages
      - name: create_nl_handler
        kind: function
        signature: (processor: Any) -> Callable[[Message], Awaitable[None]]
        description: Create message handler for natural language queries
      - name: create_nl_confirm_callback
        kind: function
        signature: (processor: Any, controller: Any) -> Callable[[Any], Awaitable[None]]
        description: Create callback handler for NL confirmation buttons
      - name: create_nl_cancel_callback
        kind: function
        signature: (processor: Any) -> Callable[[Any], Awaitable[None]]
        description: Create callback handler for NL cancel buttons

  health_command.py:
    description: Bot health status via /health command
    exports:
      - name: health_command
        kind: function
        signature: (start_time: datetime, monitor: DockerEventMonitor | None = None, log_watcher: LogWatcher | None = None, resource_monitor: ResourceMonitor | None = None, memory_monitor: MemoryMonitor | None = None, unraid_client: UnraidClientWrapper | None = None, unraid_system_monitor: UnraidSystemMonitor | None = None, unraid_array_monitor: ArrayMonitor | None = None) -> Callable[[Message], Awaitable[None]]
        description: Factory for /health command handler showing bot version, uptime, and monitor status
    imports:
      - from: src.monitors.docker_events
        items: [DockerEventMonitor]
      - from: src.monitors.log_watcher
        items: [LogWatcher]
      - from: src.monitors.resource_monitor
        items: [ResourceMonitor]
      - from: src.monitors.memory_monitor
        items: [MemoryMonitor]
      - from: src.unraid.monitors.system_monitor
        items: [UnraidSystemMonitor]
      - from: src.unraid.monitors.array_monitor
        items: [ArrayMonitor]
      - from: src.unraid.client
        items: [UnraidClientWrapper]

  setup_wizard.py:
    description: Interactive setup wizard for first-run configuration
    exports:
      - name: WizardState
        kind: class
        description: Enum for wizard state machine (IDLE, AWAITING_HOST, CONNECTING, REVIEW_CONTAINERS, ADJUSTING, SAVING, COMPLETE)
      - name: WizardSession
        kind: class
        description: Per-user session data for wizard progress
        attributes:
          - name: state
            type: WizardState
            description: Current state
          - name: unraid_host
            type: str | None
            description: Unraid server hostname/IP
          - name: unraid_port
            type: int
            description: Unraid server port
          - name: unraid_use_ssl
            type: bool
            description: Use SSL for Unraid connection
          - name: classifications
            type: list[ContainerClassification]
            description: Container classifications
          - name: adjusting_category
            type: str | None
            description: Currently adjusting category
      - name: SetupWizard
        kind: class
        description: Interactive setup wizard state machine
        methods:
          - name: __init__(config_path: str, docker_client: docker.DockerClient, anthropic_client: anthropic.AsyncAnthropic | None = None, unraid_api_key: str | None = None) -> None
            description: Initialize wizard
          - name: get_state(user_id: int) -> WizardState
            description: Get current state for user
          - name: is_active(user_id: int) -> bool
            description: Check if wizard is active for user
          - name: get_session_data(user_id: int) -> WizardSession
            description: Get session data for user
          - name: start(user_id: int) -> None
            description: Start the wizard
          - name: set_host(user_id: int, host: str) -> None
            description: Set Unraid host
          - name: connection_result(user_id: int, success: bool, port: int, use_ssl: bool) -> None
            description: Record connection result
          - name: confirm(user_id: int) -> None
            description: Confirm wizard completion
          - name: cancel(user_id: int) -> None
            description: Cancel wizard
          - name: get_existing_unraid_config() -> tuple[str, int, bool] | None
            description: Read existing Unraid config
          - name: test_unraid_connection(host: str, api_key: str) -> tuple[bool, int, bool]
            description: Async test connection to Unraid
          - name: get_docker_containers() -> list[tuple[str, str, str]]
            description: List all Docker containers
          - name: classify_containers(user_id: int) -> list[ContainerClassification]
            description: Async fetch and classify containers
          - name: save_config(user_id: int, merge: bool = False) -> None
            description: Save wizard results to config.yaml
      - name: format_classification_summary
        kind: function
        signature: (classifications: list[ContainerClassification]) -> str
        description: Format a grouped summary message with emoji for classifications
      - name: build_summary_keyboard
        kind: function
        signature: () -> InlineKeyboardMarkup
        description: Build inline keyboard with Adjust buttons and Looks Good button
      - name: build_adjust_keyboard
        kind: function
        signature: (classifications: list[ContainerClassification], category: str) -> InlineKeyboardMarkup
        description: Build a toggle keyboard for a category
      - name: create_start_handler
        kind: function
        signature: (wizard: SetupWizard) -> Callable[[Message], Awaitable[None]]
        description: Handle /start and /setup commands to begin wizard
      - name: create_cancel_handler
        kind: function
        signature: (wizard: SetupWizard) -> Callable[[Message], Awaitable[None]]
        description: Handle /cancel command to exit wizard
      - name: create_host_handler
        kind: function
        signature: (wizard: SetupWizard) -> Callable[[Message], Awaitable[None]]
        description: Handle host text input during AWAITING_HOST state
      - name: create_confirm_callback
        kind: function
        signature: (wizard: SetupWizard, on_complete: Callable[[], Awaitable[None]] | None = None) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Handle Looks Good button callback to save and complete
      - name: create_toggle_callback
        kind: function
        signature: (wizard: SetupWizard) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Handle container toggle buttons within Adjust view
      - name: create_adjust_callback
        kind: function
        signature: (wizard: SetupWizard) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Handle Adjust category buttons
      - name: create_adjust_done_callback
        kind: function
        signature: (wizard: SetupWizard) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Handle Done button to return to summary
      - name: SetupModeMiddleware
        kind: class
        description: Middleware to block non-wizard commands during setup mode
        methods:
          - name: __init__(wizard: SetupWizard) -> None
            description: Initialize middleware
          - name: __call__(handler: Callable, event: Message | CallbackQuery, data: dict[str, Any]) -> Any
            description: Intercept and filter messages during setup
    imports:
      - from: src.config
        items: [ConfigWriter]
      - from: src.services.container_classifier
        items: [ContainerClassification, ContainerClassifier, VALID_CATEGORIES]

  model_command.py:
    description: /model command for runtime LLM provider and model switching
    exports:
      - name: model_command
        kind: function
        signature: (registry: ProviderRegistry) -> Callable[[Message], Awaitable[None]]
        description: Factory for /model command handler (shows provider list)
      - name: model_provider_callback
        kind: function
        signature: (registry: ProviderRegistry) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for model_provider:* callback (shows models for selected provider)
      - name: model_select_callback
        kind: function
        signature: (registry: ProviderRegistry) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for model_select:* callback (switches to selected model)
      - name: model_back_callback
        kind: function
        signature: (registry: ProviderRegistry) -> Callable[[CallbackQuery], Awaitable[None]]
        description: Factory for model:back callback (returns to provider list)
    imports:
      - from: src.services.llm.registry
        items: [ProviderRegistry]

  memory_commands.py:
    description: Bot commands for memory management
    exports:
      - name: cancel_kill_command
        kind: function
        signature: (memory_monitor: MemoryMonitor | None) -> Callable[[Message], Awaitable[None]]
        description: Factory for /cancel-kill command handler
    imports:
      - from: src.monitors.memory_monitor
        items: [MemoryMonitor]
