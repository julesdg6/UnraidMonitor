# Monitors structure detail
module: unraid-monitor
directory: src/monitors/
description: Passive monitoring components that observe Docker containers, system resources, and log streams. Each monitor emits alerts via callbacks without direct knowledge of the alert system.

files:
  docker_events.py:
    description: Monitors Docker container lifecycle events (start, die, health_status) and detects restart loops
    exports:
      - name: CrashTracker
        kind: class
        description: Tracks container crash events and detects restart loops with escalation alerts
        methods:
          - name: record_crash
            params: [{name: container_name, type: str}]
            returns: None
          - name: check_restart_loop
            params: [{name: container_name, type: str}]
            returns: tuple[bool, int]
          - name: record_escalation
            params: [{name: container_name, type: str}]
            returns: None
          - name: get_crash_count
            params: [{name: container_name, type: str}]
            returns: int

      - name: parse_container
        kind: function
        description: Convert Docker SDK container object to ContainerInfo dataclass
        params: [{name: container, type: Container}]
        returns: ContainerInfo

      - name: DockerEventMonitor
        kind: class
        description: Subscribes to Docker daemon events, maintains container state, processes crash alerts with restart loop detection
        methods:
          - name: connect
            params: []
            returns: None
          - name: load_initial_state
            params: []
            returns: None
          - name: start
            params: []
            returns: Awaitable[None]
          - name: stop
            params: []
            returns: None

    imports:
      - from: src.models
        items: [ContainerInfo]
      - from: src.state
        items: [ContainerStateManager]
      - from: src.alerts.manager
        items: [AlertManager]
      - from: src.alerts.rate_limiter
        items: [RateLimiter]
      - from: src.alerts.mute_manager
        items: [MuteManager]

  log_watcher.py:
    description: Streams container logs, matches error patterns against configured rules, applies per-container ignore patterns
    exports:
      - name: matches_error_pattern
        kind: function
        description: Check if log line matches error patterns and is not ignored
        params: [{name: line, type: str}, {name: error_patterns, type: list[str]}, {name: ignore_patterns, type: list[str]}]
        returns: bool

      - name: should_alert_for_error
        kind: function
        description: Check if error line should trigger an alert after checking global and per-container ignores
        params: [{name: container, type: str}, {name: line, type: str}, {name: error_patterns, type: list[str]}, {name: ignore_patterns, type: list[str]}, {name: ignore_manager, type: IgnoreManager | None}]
        returns: bool

      - name: LogWatcher
        kind: class
        description: Watches container logs, detects errors, stores recent errors, and calls error callback
        methods:
          - name: connect
            params: []
            returns: None
          - name: start
            params: []
            returns: Awaitable[None]
          - name: stop
            params: []
            returns: None

    imports:
      - from: src.alerts.ignore_manager
        items: [IgnoreManager]
      - from: src.alerts.recent_errors
        items: [RecentErrorsBuffer]

  resource_monitor.py:
    description: Periodically polls container CPU/memory usage, tracks sustained violations, sends alerts when thresholds exceeded
    exports:
      - name: ContainerStats
        kind: dataclass
        description: Container resource usage statistics (CPU, memory, network, block I/O)
        properties:
          - name: name
            type: str
          - name: cpu_percent
            type: float
          - name: memory_percent
            type: float
          - name: memory_bytes
            type: int
          - name: memory_limit
            type: int

      - name: calculate_cpu_percent
        kind: function
        description: Calculate CPU percentage from Docker stats delta
        params: [{name: stats, type: dict}]
        returns: float

      - name: parse_container_stats
        kind: function
        description: Parse Docker stats dict into ContainerStats dataclass
        params: [{name: name, type: str}, {name: stats, type: dict}]
        returns: ContainerStats

      - name: ViolationState
        kind: dataclass
        description: Tracks a sustained metric threshold violation for a container
        properties:
          - name: metric
            type: str
          - name: started_at
            type: datetime
          - name: current_value
            type: float
          - name: threshold
            type: float

      - name: ResourceMonitor
        kind: class
        description: Monitors container CPU/memory usage, detects sustained violations, sends rate-limited alerts
        methods:
          - name: get_all_stats
            params: []
            returns: Awaitable[list[ContainerStats]]
          - name: get_container_stats
            params: [{name: name, type: str}]
            returns: Awaitable[ContainerStats | None]
          - name: start
            params: []
            returns: Awaitable[None]
          - name: stop
            params: []
            returns: None
          - name: is_enabled
            params: []
            returns: bool

    imports:
      - from: src.config
        items: [ResourceConfig]
      - from: src.alerts.manager
        items: [AlertManager]
      - from: src.alerts.rate_limiter
        items: [RateLimiter]
      - from: src.alerts.mute_manager
        items: [MuteManager]

  memory_monitor.py:
    description: Monitors system-wide memory pressure, manages container lifecycle under stress with configurable kill countdown
    exports:
      - name: MemoryState
        kind: enum
        description: System memory pressure state (NORMAL, WARNING, CRITICAL, KILLING, RECOVERING)

      - name: MemoryMonitor
        kind: class
        description: Monitors system memory, sends escalated alerts, kills/restarts containers to manage memory pressure
        methods:
          - name: is_enabled
            params: []
            returns: bool
          - name: get_memory_percent
            params: []
            returns: float
          - name: kill_container
            params: [{name: name, type: str}]
            returns: Awaitable[bool]
          - name: cancel_pending_kill
            params: []
            returns: bool
          - name: confirm_restart
            params: [{name: name, type: str}]
            returns: Awaitable[bool]
          - name: decline_restart
            params: [{name: name, type: str}]
            returns: Awaitable[None]
          - name: get_pending_kill
            params: []
            returns: str | None
          - name: get_killed_containers
            params: []
            returns: list[str]
          - name: start
            params: []
            returns: Awaitable[None]
          - name: stop
            params: []
            returns: None

    imports:
      - from: src.config
        items: [MemoryConfig]
