# Utils module structure detail
module: unraid-monitor
directory: src/utils/
description: Shared utility functions for error handling, formatting, rate limiting, sanitization, and Telegram retry logic

files:
  api_errors.py:
    description: Anthropic API error handling with user-friendly messages and retryability metadata.
    exports:
      - name: APIErrorResult
        kind: dataclass
        description: Result from API error handling with user message, retryability flag, and log level.
        methods: []
      - name: handle_anthropic_error
        kind: function
        description: Handles Anthropic API errors, returning user-friendly message and retryability status.
        params: [{name: error, type: Exception}]
        returns: APIErrorResult
    imports:
      - from: dataclasses
        items: [dataclass]
      - from: logging
        items: [ERROR, WARNING]
      - from: typing
        items: [TYPE_CHECKING]

  formatting.py:
    description: Formatting utilities for messages, byte sizes, uptimes, and container name extraction.
    exports:
      - name: extract_container_from_alert
        kind: function
        description: Extracts container name from various alert message types using regex patterns.
        params: [{name: text, type: str}]
        returns: str | None
      - name: format_bytes
        kind: function
        description: Formats byte count as human-readable string (e.g., 1.5GB, 500MB).
        params: [{name: bytes_val, type: int}]
        returns: str
      - name: format_uptime
        kind: function
        description: Converts seconds to human-readable uptime (e.g., 3d 14h 22m or 45m).
        params: [{name: seconds, type: int}]
        returns: str
      - name: truncate_message
        kind: function
        description: Truncates message to Telegram max length with optional suffix.
        params: [
          {name: text, type: str},
          {name: max_length, type: int},
          {name: suffix, type: str}
        ]
        returns: str
      - name: escape_markdown
        kind: function
        description: Escapes Telegram Markdown V1 special characters (*, _, `, [, \).
        params: [{name: text, type: str}]
        returns: str
    imports:
      - from: re
        items: [compile]
      - from: builtins
        items: []

  rate_limiter.py:
    description: Per-user rate limiter for API protection with minute and hour buckets.
    exports:
      - name: PerUserRateLimiter
        kind: class
        description: Rate limiter tracking requests per user with per-minute and per-hour limits.
        methods:
          - name: __init__
            params: [
              {name: max_per_minute, type: int},
              {name: max_per_hour, type: int}
            ]
            returns: None
          - name: is_allowed
            params: [{name: user_id, type: int}]
            returns: bool
          - name: get_retry_after
            params: [{name: user_id, type: int}]
            returns: int
          - name: _cleanup_empty
            params: []
            returns: None
    imports:
      - from: collections
        items: [defaultdict]
      - from: datetime
        items: [datetime, timedelta]

  sanitize.py:
    description: Input sanitization for prompt injection prevention and sensitive data redaction in logs.
    exports:
      - name: sanitize_for_prompt
        kind: function
        description: Sanitizes user-controlled text for inclusion in AI prompts, blocking injection patterns.
        params: [
          {name: text, type: str},
          {name: max_length, type: int}
        ]
        returns: str
      - name: sanitize_logs_for_display
        kind: function
        description: Removes API keys, tokens, passwords, and other sensitive data from logs before display.
        params: [{name: logs, type: str}]
        returns: str
      - name: sanitize_container_name
        kind: function
        description: Sanitizes container name for safe inclusion in prompts (max 256 chars).
        params: [{name: name, type: str}]
        returns: str
      - name: sanitize_logs
        kind: function
        description: Sanitizes container logs for inclusion in prompts with injection prevention.
        params: [
          {name: logs, type: str},
          {name: max_length, type: int}
        ]
        returns: str
    imports:
      - from: re
        items: [compile, sub, search, DOTALL, IGNORECASE, MULTILINE]

  telegram_retry.py:
    description: Telegram API retry utilities for handling rate limits and transient failures.
    exports:
      - name: send_with_retry
        kind: function
        description: Executes Telegram API call with exponential backoff retry on rate limits.
        params: [
          {name: coro_func, type: Callable},
          {name: max_retries, type: int}
        ]
        returns: Coroutine[T | None]
      - name: with_telegram_retry
        kind: function
        description: Decorator for async functions sending Telegram messages with automatic retry logic.
        params: [{name: max_retries, type: int}]
        returns: Callable
    imports:
      - from: asyncio
        items: [sleep]
      - from: functools
        items: [wraps]
      - from: typing
        items: [TypeVar, Callable, Awaitable, ParamSpec]
      - from: aiogram.exceptions
        items: [TelegramRetryAfter, TelegramAPIError]
