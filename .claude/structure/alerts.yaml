# alerts structure detail
module: unraid-monitor
directory: src/alerts/
description: Alert management layer for formatting, sending Telegram messages, rate-limiting, muting, and error pattern ignoring

files:
  manager.py:
    description: Telegram alert message formatting and sending with quick-action buttons
    exports:
      - name: ChatIdStore
        kind: class
        description: In-memory storage for alert chat ID
        methods:
          - name: set_chat_id
            params: [{name: chat_id, type: int}]
            returns: None
          - name: get_chat_id
            params: []
            returns: int | None
      - name: AlertManager
        kind: class
        description: Manages sending formatted alerts to Telegram with inline keyboards
        methods:
          - name: __init__
            params: [{name: bot, type: Bot}, {name: chat_id, type: int}, {name: error_display_max_chars, type: int}]
            returns: None
          - name: send_crash_alert
            params: [{name: container_name, type: str}, {name: exit_code, type: int}, {name: image, type: str}, {name: uptime_seconds, type: "int | None"}, {name: restart_loop_count, type: "int | None"}]
            returns: Coroutine[None]
          - name: send_log_error_alert
            params: [{name: container_name, type: str}, {name: error_line, type: str}, {name: suppressed_count, type: int}]
            returns: Coroutine[None]
          - name: send_resource_alert
            params: [{name: container_name, type: str}, {name: metric, type: str}, {name: current_value, type: float}, {name: threshold, type: int}, {name: duration_seconds, type: int}, {name: memory_bytes, type: int}, {name: memory_limit, type: int}, {name: memory_percent, type: float}, {name: cpu_percent, type: float}]
            returns: Coroutine[None]
    imports:
      - from: src.utils.formatting
        items: [format_bytes, format_uptime]
      - from: src.utils.telegram_retry
        items: [send_with_retry]

  rate_limiter.py:
    description: Rate limiter to prevent alert spam with per-container cooldown tracking
    exports:
      - name: RateLimiter
        kind: class
        description: Tracks alert send times and suppressed counts per container
        methods:
          - name: __init__
            params: [{name: cooldown_seconds, type: int}]
            returns: None
          - name: should_alert
            params: [{name: container_name, type: str}]
            returns: bool
          - name: record_alert
            params: [{name: container_name, type: str}]
            returns: None
          - name: record_suppressed
            params: [{name: container_name, type: str}]
            returns: None
          - name: get_suppressed_count
            params: [{name: container_name, type: str}]
            returns: int
          - name: cleanup_stale
            params: []
            returns: int

  mute_manager.py:
    description: Manages temporary container mutes with duration parsing and expiry tracking
    exports:
      - name: parse_duration
        kind: function
        description: Parse duration string like '15m' or '2h' into timedelta
        params: [{name: text, type: str}]
        returns: timedelta | None
      - name: MuteManager
        kind: class
        description: Manages temporary mutes for containers with JSON persistence
        methods:
          - name: is_muted
            params: [{name: container, type: str}]
            returns: bool
          - name: add_mute
            params: [{name: container, type: str}, {name: duration, type: timedelta}]
            returns: datetime
          - name: remove_mute
            params: [{name: container, type: str}]
            returns: bool
          - name: get_active_mutes
            params: []
            returns: list[tuple[str, datetime]]
    imports:
      - from: src.alerts.base_mute_manager
        items: [BaseMuteManager]

  server_mute_manager.py:
    description: Manages mutes for Unraid server alerts (system, array, UPS) independently
    exports:
      - name: ServerMuteManager
        kind: class
        description: Mute manager for server, array, and UPS alerts with multi-category support
        methods:
          - name: is_server_muted
            params: []
            returns: bool
          - name: is_array_muted
            params: []
            returns: bool
          - name: is_ups_muted
            params: []
            returns: bool
          - name: mute_server
            params: [{name: duration, type: timedelta}]
            returns: datetime
          - name: mute_array
            params: [{name: duration, type: timedelta}]
            returns: datetime
          - name: mute_ups
            params: [{name: duration, type: timedelta}]
            returns: datetime
          - name: unmute_server
            params: []
            returns: bool
          - name: unmute_array
            params: []
            returns: bool
          - name: unmute_ups
            params: []
            returns: bool
          - name: get_active_mutes
            params: []
            returns: list[tuple[str, datetime]]
    imports:
      - from: src.alerts.base_mute_manager
        items: [BaseMuteManager]

  array_mute_manager.py:
    description: Manages mutes for array/disk alerts independently from server alerts
    exports:
      - name: ArrayMuteManager
        kind: class
        description: Focused mute manager for array/disk alerts only
        methods:
          - name: is_array_muted
            params: []
            returns: bool
          - name: mute_array
            params: [{name: duration, type: timedelta}]
            returns: datetime
          - name: unmute_array
            params: []
            returns: bool
          - name: get_mute_expiry
            params: []
            returns: datetime | None
    imports:
      - from: src.alerts.base_mute_manager
        items: [BaseMuteManager]

  base_mute_manager.py:
    description: Base class providing JSON persistence and thread-safe mute state management
    exports:
      - name: BaseMuteManager
        kind: class
        description: Base mute manager with atomic JSON persistence and thread-safe operations
        methods:
          - name: __init__
            params: [{name: json_path, type: str}]
            returns: None
          - name: _is_muted
            params: [{name: key, type: str}]
            returns: bool
          - name: _add_mute
            params: [{name: key, type: str}, {name: duration, type: timedelta}]
            returns: datetime
          - name: _remove_mute
            params: [{name: key, type: str}]
            returns: bool
          - name: _get_active_mutes
            params: []
            returns: list[tuple[str, datetime]]
          - name: _clean_expired
            params: []
            returns: None
          - name: _load
            params: []
            returns: None
          - name: _save
            params: []
            returns: None

  ignore_manager.py:
    description: Manages error ignore patterns from config and runtime with regex validation and safety
    exports:
      - name: validate_regex_pattern
        kind: function
        description: Validate regex pattern for safety and correctness, checking for ReDoS attacks
        params: [{name: pattern, type: str}]
        returns: tuple[bool, str]
      - name: IgnorePattern
        kind: class
        description: Dataclass representing an ignore pattern with metadata and pre-compiled regex
        attributes:
          - name: pattern
            type: str
            description: The pattern string (substring or regex)
          - name: match_type
            type: Literal["substring", "regex"]
            description: Type of matching (default "substring")
          - name: explanation
            type: str | None
            description: Human-readable explanation of the pattern
          - name: added
            type: str | None
            description: ISO timestamp when pattern was added
        methods:
          - name: matches
            params: [{name: message, type: str}]
            returns: bool
      - name: IgnoreManager
        kind: class
        description: Manages error patterns from config.yaml and runtime JSON with regex support
        methods:
          - name: __init__
            params: [{name: config_ignores, type: "dict[str, list[str]]"}, {name: json_path, type: str}]
            returns: None
          - name: is_ignored
            params: [{name: container, type: str}, {name: message, type: str}]
            returns: bool
          - name: add_ignore_pattern
            params: [{name: container, type: str}, {name: pattern, type: str}, {name: match_type, type: Literal["substring", "regex"]}, {name: explanation, type: "str | None"}]
            returns: tuple[bool, str]
          - name: add_ignore
            params: [{name: container, type: str}, {name: message, type: str}]
            returns: bool
          - name: get_all_ignores
            params: [{name: container, type: str}]
            returns: list[tuple[str, str, "str | None"]]
          - name: get_runtime_ignores
            params: [{name: container, type: str}]
            returns: list[tuple[int, str, "str | None"]]
          - name: get_containers_with_runtime_ignores
            params: []
            returns: list[str]
          - name: remove_runtime_ignore
            params: [{name: container, type: str}, {name: index, type: int}]
            returns: bool

  recent_errors.py:
    description: Thread-safe buffer for tracking recent error messages per container
    exports:
      - name: RecentError
        kind: class
        description: Dataclass representing a recent error with timestamp
        attributes:
          - name: message
            type: str
          - name: timestamp
            type: datetime
      - name: RecentErrorsBuffer
        kind: class
        description: Thread-safe buffer tracking recent errors per container with pruning
        methods:
          - name: __init__
            params: [{name: max_age_seconds, type: int}, {name: max_per_container, type: int}]
            returns: None
          - name: add
            params: [{name: container, type: str}, {name: message, type: str}]
            returns: None
          - name: get_recent
            params: [{name: container, type: str}]
            returns: list[str]

  __init__.py:
    description: Module marker file (currently empty)
    exports: []

key_patterns:
  - name: JSON Persistence
    description: BaseMuteManager and IgnoreManager use atomic write pattern (temp file + rename) for thread-safe persistence
  - name: Thread Safety
    description: All managers use threading.RLock or threading.Lock for concurrent access from multiple threads
  - name: ReDoS Protection
    description: IgnoreManager validates regex patterns to prevent ReDoS (Regular Expression Denial of Service) attacks
  - name: Graceful Degradation
    description: IgnorePattern handles both old (string) and new (object) formats; invalid regex patterns log warnings and disable
  - name: Rate Limiting
    description: RateLimiter uses configurable cooldown to deduplicate alerts; suppression count tracks intermediate events
  - name: Mute Hierarchy
    description: MuteManager (containers), ServerMuteManager (server/array/UPS), ArrayMuteManager (array-only) support independent muting
  - name: Quick-Action Alerts
    description: AlertManager formats alerts with inline keyboards (buttons) for quick restart, logs, mute, diagnose actions
  - name: Error Deduplication
    description: RecentErrorsBuffer maintains unique errors per container and prunes stale entries
